<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a1a">
<title>BugWars: Side Scroll</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;overscroll-behavior:none}
body{background:#0a0a1a;font-family:'Press Start 2P',monospace;overflow:hidden;width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#e0e0e0}
#game-wrap{display:flex;flex-direction:column;align-items:center;width:100%;height:100%}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;flex-shrink:1}
.hidden{display:none!important}
#controls-bar{display:none;width:100%;max-width:900px;background:#0e0e20;border-top:2px solid #222;padding:8px 14px;flex-direction:row;align-items:center;justify-content:space-between;font-size:10px;color:#888;gap:10px;flex-wrap:wrap}
#controls-bar.show{display:flex}
#controls-bar .keys{color:#44ffaa}
#controls-bar .sep{color:#333;margin:0 4px}
#home-btn{background:#1a1a3a;border:2px solid #44ffaa;color:#44ffaa;font-family:'Press Start 2P',monospace;font-size:8px;padding:5px 12px;cursor:pointer;white-space:nowrap}
#home-btn:hover{background:#44ffaa;color:#0a0a1a}
/* Mobile touch controls */
#touch-controls{display:none;position:fixed;bottom:0;left:0;right:0;height:130px;z-index:30;pointer-events:none;padding:0 10px 10px;padding-bottom:max(10px,env(safe-area-inset-bottom))}
#touch-controls.show{display:flex;justify-content:space-between;align-items:flex-end}
.touch-btn{pointer-events:auto;display:flex;align-items:center;justify-content:center;border-radius:50%;font-family:'Press Start 2P',monospace;font-size:14px;color:rgba(255,255,255,0.8);-webkit-tap-highlight-color:transparent;border:none;outline:none}
.touch-btn:active,.touch-btn.pressed{transform:scale(0.92)}
.dpad-area{display:flex;flex-direction:column;align-items:center;gap:4px}
.dpad-row{display:flex;gap:4px}
.dpad-btn{width:56px;height:56px;background:rgba(68,255,170,0.18);border:2px solid rgba(68,255,170,0.4)}
.dpad-btn.pressed{background:rgba(68,255,170,0.45);border-color:rgba(68,255,170,0.8)}
.action-area{display:flex;gap:10px;align-items:flex-end}
.action-btn{width:68px;height:68px;background:rgba(255,68,68,0.2);border:2px solid rgba(255,68,68,0.4)}
.action-btn.pressed{background:rgba(255,68,68,0.5);border-color:rgba(255,68,68,0.8)}
.action-btn.shoot{background:rgba(68,170,255,0.2);border-color:rgba(68,170,255,0.4)}
.action-btn.shoot.pressed{background:rgba(68,170,255,0.5);border-color:rgba(68,170,255,0.8)}
.action-btn.pause-btn{width:42px;height:42px;background:rgba(255,220,68,0.15);border-color:rgba(255,220,68,0.3);font-size:10px}
.action-btn.pause-btn.pressed{background:rgba(255,220,68,0.4)}
.action-btn.home-mobile{width:42px;height:42px;background:rgba(68,255,170,0.15);border-color:rgba(68,255,170,0.3);font-size:10px}
</style>
</head>
<body>
<div id="game-wrap">
<canvas id="game"></canvas>
<div id="controls-bar">
  <span><span class="keys">← → ↑</span> or <span class="keys">WASD</span> Move/Jump</span>
  <span class="sep">|</span>
  <span><span class="keys">X</span> / <span class="keys">F</span> Shoot</span>
  <span class="sep">|</span>
  <span><span class="keys">P</span> Pause</span>
  <span class="sep">|</span>
  <button id="home-btn" class="hidden" onclick="confirmHome()">🏠 HOME</button>
</div>
</div>
<div id="touch-controls">
  <div class="action-area">
    <div class="touch-btn action-btn home-mobile" id="tb-home" onclick="confirmHome()">🏠</div>
    <div class="touch-btn action-btn pause-btn" data-key="pause" id="tb-pause">⏸</div>
    <div class="touch-btn action-btn shoot" data-key="KeyX" id="tb-shoot">🔫</div>
  </div>
  <div class="dpad-area">
    <div class="dpad-row">
      <div class="touch-btn dpad-btn" data-key="ArrowUp" id="tb-up">▲</div>
    </div>
    <div class="dpad-row">
      <div class="touch-btn dpad-btn" data-key="ArrowLeft" id="tb-left">◀</div>
      <div style="width:56px;height:56px"></div>
      <div class="touch-btn dpad-btn" data-key="ArrowRight" id="tb-right">▶</div>
    </div>
  </div>
</div>
<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),homeBtn=document.getElementById('home-btn'),controlsBar=document.getElementById('controls-bar'),touchControls=document.getElementById('touch-controls');
let W,H;
// Mobile = touch capable AND narrow screen (excludes touchscreen laptops)
const isMobile=('ontouchstart' in window||navigator.maxTouchPoints>0)&&(window.innerWidth<=900);
const CONTROLS_H=isMobile?0:38;
const TOUCH_H=isMobile?130:0;
// Mobile UI scale factor for text
const mS=isMobile?Math.min(1,window.innerWidth/420):1;
function resize(){
  W=window.innerWidth;
  H=window.innerHeight-CONTROLS_H-TOUCH_H;
  canvas.width=W;canvas.height=H;canvas.style.width=W+'px';canvas.style.height=H+'px';
}
resize();window.addEventListener('resize',resize);
// Prevent iOS pull-to-refresh and bounce
document.addEventListener('touchmove',e=>{if(e.target===document.body||e.target===document.documentElement)e.preventDefault()},{passive:false});

// ===== STATE =====
const S={screen:'title',level:0,score:0,hp:100,maxHp:100,streak:0,bestStreak:0,bugsDefeated:0,totalBugs:0,
  powerUps:{idConsult:0},battleData:null,battlePhase:0,selectedEmpiric:null,empiricResult:null,
  codexTab:'bugs',codexScroll:0,shakeTimer:0,shakeIntensity:0,floatingTexts:[],particles:[],
  levelTransition:0,comboAnim:0,empiricPicks:[],
  // Boss state
  bossActive:false,bossData:null,bossPhase:'intro', // intro, trivia, victory
  bossHP:0,bossMaxHP:0,bossQ:0,bossTriviaQ:null,bossTimer:0,bossResult:null,
  bossVictoryTimer:0,bossIdUsed:false,bossElims:[],usedBossTrivia:[],
  leaderboard:JSON.parse(localStorage.getItem('bw_lb')||'[]'),nameEntry:false,nameText:'',lbSubmitted:false,paused:false,
};

const keys={};
window.addEventListener('keydown',e=>{keys[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
  if(e.code==='KeyP'&&!S.nameEntry&&(S.screen==='playing'||S.screen==='battle'||S.paused)){S.paused=!S.paused;return}
  if(S.nameEntry){e.preventDefault();if(e.code==='Backspace')S.nameText=S.nameText.slice(0,-1);
  else if(e.code==='Enter'&&S.nameText.length>0)submitScore();
  else if(e.key.length===1&&S.nameText.length<10)S.nameText+=e.key.toUpperCase()}});
window.addEventListener('keyup',e=>{keys[e.code]=false});

// ===== MOBILE TOUCH CONTROLS =====
if(isMobile){
  // Hide desktop controls, show touch
  controlsBar.style.display='none';
  document.body.style.overflow='hidden';
  document.addEventListener('gesturestart',e=>e.preventDefault());
  
  // Track active touches per button
  const touchMap=new Map();
  function setBtn(id,pressed){
    const el=document.getElementById(id);
    if(el){if(pressed)el.classList.add('pressed');else el.classList.remove('pressed')}
  }
  
  // D-pad and action buttons
  document.querySelectorAll('.touch-btn[data-key]').forEach(btn=>{
    const key=btn.dataset.key;
    btn.addEventListener('touchstart',e=>{
      e.preventDefault();initAudio();
      for(const t of e.changedTouches)touchMap.set(t.identifier,{key,id:btn.id});
      if(key==='pause'){S.paused=!S.paused}
      else{keys[key]=true}
      setBtn(btn.id,true);
    },{passive:false});
    btn.addEventListener('touchend',e=>{
      e.preventDefault();
      for(const t of e.changedTouches){
        const tm=touchMap.get(t.identifier);
        if(tm&&tm.key===key){touchMap.delete(t.identifier);if(key!=='pause')keys[key]=false;setBtn(btn.id,false)}
      }
    },{passive:false});
    btn.addEventListener('touchcancel',e=>{
      for(const t of e.changedTouches){
        const tm=touchMap.get(t.identifier);
        if(tm&&tm.key===key){touchMap.delete(t.identifier);if(key!=='pause')keys[key]=false;setBtn(btn.id,false)}
      }
    },{passive:false});
  });
  
  // Canvas touch → click for menus/battles/boss
  canvas.addEventListener('touchstart',e=>{
    e.preventDefault();initAudio();
    const r=canvas.getBoundingClientRect();
    const t=e.changedTouches[0];
    const mx=t.clientX-r.left,my=t.clientY-r.top;
    if(S.bossActive){handleBossClick(mx,my);return}
    switch(S.screen){
      case'title':handleTitleClick(mx,my);break;
      case'battle':handleBattleClick(mx,my);break;
      case'codex':handleCodexClick(mx,my);break;
      case'howto':if(mx>W/2-60&&mx<W/2+60&&my>H-50&&my<H-18)S.screen='title';break;
      case'gameover':case'victory':handleEndClick(mx,my);break;
    }
  },{passive:false});
  
  // Codex scroll via touch drag
  let codexTouchY=null;
  canvas.addEventListener('touchmove',e=>{
    if(S.screen==='codex'){
      e.preventDefault();
      const t=e.changedTouches[0];
      if(codexTouchY!==null){
        const dy=codexTouchY-t.clientY;
        S.codexScroll+=dy;
        let totalH=0;
        if(S.codexTab==='bugs'){const grps=[b=>b.gram==='pos',b=>b.gram==='neg',b=>b.gram==='atyp'];for(const f of grps){const n=Object.keys(BUGS).filter(k=>f(BUGS[k])).length;if(n>0)totalH+=32+n*96+4}}
        else{const grpNames=[...new Set(Object.values(ABX).map(a=>a.grp))];for(const g of grpNames){const n=Object.keys(ABX).filter(k=>ABX[k].grp===g).length;if(n>0)totalH+=32+n*96+4}}
        const max=Math.max(0,totalH-H+100);S.codexScroll=Math.max(0,Math.min(S.codexScroll,max));
      }
      codexTouchY=t.clientY;
    }
  },{passive:false});
  canvas.addEventListener('touchend',()=>{codexTouchY=null});
}

// ===== AUDIO =====
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(f,d,t='square',v=0.12){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d)}
function sfx(n){initAudio();switch(n){
  case'jump':playTone(300,.1);setTimeout(()=>playTone(500,.08),30);break;
  case'land':playTone(100,.08,'sine',.08);break;
  case'collect':playTone(600,.08);setTimeout(()=>playTone(900,.1),60);break;
  case'battleStart':playTone(200,.1);setTimeout(()=>playTone(300,.1),80);setTimeout(()=>playTone(400,.15),160);break;
  case'correct':[400,500,700].forEach((f,i)=>setTimeout(()=>playTone(f,.12),i*80));break;
  case'wrong':playTone(300,.15,'sawtooth');setTimeout(()=>playTone(200,.2,'sawtooth'),100);break;
  case'combo':[400,500,600,800].forEach((f,i)=>setTimeout(()=>playTone(f,.12),i*60));break;
  case'streak':[500,600,700,800,1000].forEach((f,i)=>setTimeout(()=>playTone(f,.1),i*50));break;
  case'damage':playTone(80,.3,'sawtooth',.18);break;
  case'levelComplete':[400,500,600,500,600,800].forEach((f,i)=>setTimeout(()=>playTone(f,.15),i*100));break;
  case'partial':playTone(400,.1);setTimeout(()=>playTone(350,.15),100);break;
  case'step':playTone(80+Math.random()*40,.03,'sine',.02);break;
  case'hurt':playTone(150,.15,'sawtooth',.15);setTimeout(()=>playTone(100,.1,'sawtooth',.1),80);break;
  case'select':playTone(500,.06);break;case'deselect':playTone(350,.06);break;
  case'5050':playTone(400,.06);setTimeout(()=>playTone(600,.08),50);setTimeout(()=>playTone(800,.06),100);break;
  case'bossHit':playTone(200,.08);setTimeout(()=>playTone(350,.1),50);setTimeout(()=>playTone(500,.12),100);break;
  case'bossRoar':playTone(80,.4,'sawtooth',.2);setTimeout(()=>playTone(60,.3,'sawtooth',.15),200);break;
  case'bossDefeat':[300,400,500,600,700,800,900,1000].forEach((f,i)=>setTimeout(()=>playTone(f,.15),i*80));break;
  case'tick':playTone(800,.03,'sine',.08);break;
  case'timeup':playTone(200,.3,'sawtooth',.15);break;
  case'projectile':playTone(120,.1,'sine',.06);break;
}}

// ===== CLINICAL DATA =====
const BUGS={
  MSSA:{name:'MSSA',full:'Methicillin-Sensitive S. aureus',gram:'pos',morph:'cocci in clusters',resist:[],site:'wound',color:'#bb77ee',pearl:"Cefazolin or Cloxacillin SUPERIOR to Vancomycin for MSSA. Always de-escalate."},
  MRSA:{name:'MRSA',full:'Methicillin-Resistant S. aureus',gram:'pos',morph:'cocci in clusters',resist:['mrsa'],site:'skin',color:'#bb77ee',pearl:"Altered PBP2a = resistance to all beta-lactams except Ceftaroline."},
  GAS:{name:'Strep pyogenes',full:'Group A Streptococcus',gram:'pos',morph:'cocci in chains',resist:[],site:'pharynx',color:'#bb77ee',pearl:"Universally susceptible to penicillin. No resistance ever reported."},
  SPN:{name:'S. pneumoniae',full:'Streptococcus pneumoniae',gram:'pos',morph:'lancet-shaped diplococci',resist:[],site:'lungs',color:'#bb77ee',pearl:"#1 cause of CAP. Treat with CTX+Azithro or respiratory FQ."},
  EFAECALIS:{name:'E. faecalis',full:'Enterococcus faecalis',gram:'pos',morph:'cocci in pairs/chains',resist:['lame'],site:'urine',color:'#bb77ee',pearl:"LAME gap: cephalosporins NEVER cover Enterococcus. Ampicillin first-line."},
  VRE:{name:'VRE',full:'Vancomycin-Resistant Enterococcus',gram:'pos',morph:'cocci in pairs',resist:['lame','vre'],site:'urine',color:'#bb77ee',pearl:"Usually E. faecium. Daptomycin or Linezolid. Risk: prolonged ICU, prior Vanc."},
  ECOLI:{name:'E. coli',full:'Escherichia coli',gram:'neg',morph:'rods',resist:[],site:'urine',color:'#ff6688',pearl:"#1 UTI cause. ~50% Amp-resistant. Nitrofurantoin/TMP-SMX for uncomplicated."},
  ECOLI_ESBL:{name:'ESBL E. coli',full:'ESBL-producing E. coli',gram:'neg',morph:'rods',resist:['esbl'],site:'urine',color:'#ff6688',pearl:"ESBL hydrolyzes cephalosporins. Carbapenems = treatment of choice."},
  KLEB:{name:'K. pneumoniae',full:'Klebsiella pneumoniae',gram:'neg',morph:'rods (mucoid)',resist:[],site:'lungs',color:'#ff6688',pearl:"Classic 'currant jelly' sputum in alcoholics. Can produce ESBLs."},
  PSEUDO:{name:'P. aeruginosa',full:'Pseudomonas aeruginosa',gram:'neg',morph:'rods (oxidase+)',resist:['pseudo'],site:'lungs',color:'#ff6688',pearl:"Needs SPECIFIC agents: Pip-Tazo, Cefepime, Mero. Ertapenem does NOT cover."},
  NEISSERIA:{name:'N. gonorrhoeae',full:'Neisseria gonorrhoeae',gram:'neg',morph:'intracellular diplococci',resist:[],site:'GU',color:'#ff6688',pearl:"Ceftriaxone IM = sole first-line. Always test for Chlamydia co-infection."},
  BACTEROIDES:{name:'B. fragilis',full:'Bacteroides fragilis',gram:'neg',morph:'rods (anaerobe)',resist:['anaerobe'],site:'abdomen',color:'#ff6688',pearl:"Key anaerobe in IAI. Metronidazole, Pip-Tazo, or carbapenems."},
  MYCO:{name:'M. pneumoniae',full:'Mycoplasma pneumoniae',gram:'atyp',morph:'(no cell wall)',resist:['atyp'],site:'lungs',color:'#55ddbb',pearl:"NO CELL WALL. Beta-lactams useless. Doxy/Azithro/FQ."},
  LEGIONELLA:{name:'L. pneumophila',full:'Legionella pneumophila',gram:'atyp',morph:'(intracellular)',resist:['atyp'],site:'lungs',color:'#55ddbb',pearl:"Water exposure, GI symptoms, hyponatremia. Urine antigen test. FQ or Azithro."},
  CHLAMYDIA:{name:'C. trachomatis',full:'Chlamydia trachomatis',gram:'atyp',morph:'(obligate intracell.)',resist:['atyp'],site:'GU',color:'#55ddbb',pearl:"Most common bacterial STI. Obligate intracellular. Doxy 7d or Azithro single dose."},
  PJP:{name:'P. jirovecii',full:'Pneumocystis jirovecii',gram:'atyp',morph:'(fungus, atypical)',resist:['pjp'],site:'lungs',color:'#cc88ff',pearl:"Fungal PNA in HIV/immunocompromised. CD4 <200 → TMP-SMX prophylaxis. Bilateral ground-glass on CT."},
  CDIFF:{name:'C. difficile',full:'Clostridioides difficile',gram:'pos',morph:'anaerobic spore-forming rods',resist:['cdiff'],site:'GI',color:'#aadd44',pearl:"Toxin-mediated colitis from antibiotic disruption. Oral Vancomycin first-line. Fidaxomicin alternative."},
  HPYLORI:{name:'H. pylori',full:'Helicobacter pylori',gram:'neg',morph:'spiral/curved rods (urease+)',resist:['hpylori'],site:'GI',color:'#ffaa55',pearl:"#1 cause of PUD. Triple therapy: PPI + Clarithromycin + Amoxicillin x14d. Urea breath test to confirm eradication."},
  LISTERIA:{name:'L. monocytogenes',full:'Listeria monocytogenes',gram:'pos',morph:'rods (tumbling motility)',resist:['listeria'],site:'CNS',color:'#ff88cc',pearl:"Meningitis in neonates, elderly, immunocompromised. Ampicillin is treatment of choice. Cephalosporins do NOT cover!"},
};

const ABX={
  // --- Cephalosporins (blue) ---
  cefazolin:{name:'Cefazolin',cls:'1st-gen Cephalosporin',grp:'Cephalosporins',color:'#4488ff',spectrum:'Gram+ (MSSA), limited GN',pearl:"Great for MSSA and surgical prophylaxis. No Enterococcus (LAME).",se:'Hypersensitivity, GI upset. Low PCN cross-reactivity.'},
  ceftriaxone:{name:'Ceftriaxone',cls:'3rd-gen Cephalosporin',grp:'Cephalosporins',color:'#4488ff',spectrum:'Broad GN, some GP',pearl:"Workhorse. First-line gonorrhea. Pairs with Doxy for GC+Chlamydia.",se:'Biliary sludging (avoid neonates), C. diff.'},
  cefepime:{name:'Cefepime',cls:'4th-gen Cephalosporin',grp:'Cephalosporins',color:'#4488ff',spectrum:'Broad GN + Pseudomonas',pearl:"First-line febrile neutropenia (ANC<500). Anti-Pseudomonal ceph.",se:'Neurotoxicity (seizures) esp. renal impairment.'},
  ceftaroline:{name:'Ceftaroline',cls:'5th-gen Cephalosporin',grp:'Cephalosporins',color:'#4488ff',spectrum:'MRSA + broad GP/GN',pearl:"ONLY cephalosporin with MRSA activity.",se:'Hypersensitivity, diarrhea.'},
  // --- Penicillins (cyan) ---
  cloxacillin:{name:'Cloxacillin',cls:'Anti-staph Penicillin',grp:'Penicillins',color:'#44ddcc',spectrum:'MSSA (superior to Vanc)',pearl:"First-line MSSA with Cefazolin. Better outcomes than Vancomycin.",se:'GI upset, hepatotoxicity, hypersensitivity.'},
  ampicillin:{name:'Ampicillin',cls:'Aminopenicillin',grp:'Penicillins',color:'#44ddcc',spectrum:'GP incl. Enterococcus + Listeria',pearl:"First-line Enterococcus & Listeria. ADD to meningitis empirics in elderly/neonates.",se:'Rash with EBV/mono! Diarrhea, hypersensitivity.'},
  pipTazo:{name:'Pip-Tazo',cls:'β-lactam / BLI',grp:'Penicillins',color:'#44ddcc',spectrum:'Very broad: Pseudomonas + anaerobes',pearl:"Covers Pseudomonas + anaerobes. Pairs with Vanc for sepsis.",se:'Hypokalemia, thrombocytopenia, nephritis (w/ Vanc).'},
  // --- Carbapenems (orange) ---
  meropenem:{name:'Meropenem',cls:'Carbapenem',grp:'Carbapenems',color:'#ff8844',spectrum:'Broadest: GN, GP, anaerobes, Pseudomonas',pearl:"Nuclear option. ESBL treatment of choice.",se:'Seizure risk, C. diff. Promotes resistance.'},
  ertapenem:{name:'Ertapenem',cls:'Carbapenem',grp:'Carbapenems',color:'#ff8844',spectrum:'Broad but NO Pseudomonas',pearl:"Only carbapenem WITHOUT Pseudomonal activity.",se:'Seizures (rare), C. diff.'},
  // --- Glycopeptides (purple) ---
  vancomycin:{name:'Vancomycin (IV)',cls:'Glycopeptide',grp:'Glycopeptides',color:'#bb77ee',spectrum:'Gram+ including MRSA',pearl:"IV for MRSA. Inferior to Cefazolin/Cloxacillin for MSSA. NOT for C. diff (use ORAL).",se:'Red Man Syndrome (slow infusion!), nephrotoxicity + ototoxicity.'},
  oralVancomycin:{name:'Vancomycin (Oral)',cls:'Glycopeptide (Oral)',grp:'Glycopeptides',color:'#bb77ee',spectrum:'C. difficile (stays in GI tract)',pearl:"ORAL = not absorbed → acts locally in colon. First-line C. diff treatment.",se:'Minimal systemic effects. GI upset.'},
  // --- Lipopeptides (pink) ---
  daptomycin:{name:'Daptomycin',cls:'Lipopeptide',grp:'Lipopeptides',color:'#ff66aa',spectrum:'GP including MRSA/VRE',pearl:"NEVER for pneumonia (surfactant inactivation).",se:'Myopathy/rhabdo — monitor CPK weekly.'},
  // --- Fluoroquinolones (teal/green) ---
  levofloxacin:{name:'Levofloxacin',cls:'Fluoroquinolone',grp:'Fluoroquinolones',color:'#44cc88',spectrum:'Broad: GN, atypicals, Pseudomonas',pearl:"Respiratory FQ. Monotherapy CAP option.",se:'Tendon rupture (steroids/elderly!), QTc, aortic aneurysm.'},
  ciprofloxacin:{name:'Ciprofloxacin',cls:'Fluoroquinolone',grp:'Fluoroquinolones',color:'#44cc88',spectrum:'Broad GN, Pseudomonas',pearl:"Best FQ for GN/Pseudomonas. First-line pyelonephritis & prostatitis. NOT respiratory.",se:'Tendon rupture, QTc, aortic aneurysm, arthropathy in kids.'},
  // --- Macrolides (green) ---
  azithromycin:{name:'Azithromycin',cls:'Macrolide',grp:'Macrolides',color:'#66dd66',spectrum:'Atypicals, some GP',pearl:"Pairs with CTX for CAP. Single-dose Chlamydia.",se:'QTc prolongation, GI upset, hepatotoxicity (rare).'},
  clarithromycin:{name:'Clarithromycin',cls:'Macrolide',grp:'Macrolides',color:'#66dd66',spectrum:'GP, atypicals, H. pylori',pearl:"Part of H. pylori triple therapy (PPI + Clarithro + Amox). MAC prophylaxis in HIV.",se:'GI upset, metallic taste, QTc prolongation, CYP3A4 inhibitor.'},
  // --- Tetracyclines (yellow) ---
  doxycycline:{name:'Doxycycline',cls:'Tetracycline',grp:'Tetracyclines',color:'#ddcc44',spectrum:'Atypicals, some GP/GN',pearl:"Key atypical agent. First-line Chlamydia & Lyme.",se:'Photosensitivity! Esophageal ulcers. Tooth discolor in kids.'},
  // --- Folate Inhibitors (salmon) ---

// ===== DRAW =====
function dR(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h))}
function dT(t,x,y,sz,c,al,mw){
  const s=Math.round(sz*mS);const wmw=mw?mw*mS:undefined;
  ctx.font=s+'px "Press Start 2P"';ctx.fillStyle=c||'#e0e0e0';ctx.textAlign=al||'left';ctx.textBaseline='top';
  if(wmw){const words=t.split(' ');let line='',ly=y;for(const w of words){const test=line+(line?' ':'')+w;if(ctx.measureText(test).width>wmw&&line){ctx.fillText(line,x,ly);line=w;ly+=s*1.6}else line=test}ctx.fillText(line,x,ly);return ly+s*1.6-y}
  ctx.fillText(t,x,y);return s*1.6;
}

function drawDoc(x,y,f,fr,j){
  ctx.save();ctx.translate(x,y);if(f<0){ctx.scale(-1,1);ctx.translate(-24,0)}
  const lo=j?-2:Math.sin(fr*0.3)*3;
  // Legs (walk animation)
  dR(6,26,5,8,'#2244aa');dR(13,26+(j?2:lo),5,8,'#2244aa');
  // Shoes
  dR(5,33,7,3,'#222');dR(12,33+(j?2:lo),7,3,'#222');
  // Lab coat body
  dR(3,10,18,18,'#e8e8f0');dR(5,12,14,14,'#dde0e8');
  // Coat lapels
  dR(3,10,3,14,'#d0d4e0');dR(18,10,3,14,'#d0d4e0');
  // Coat buttons
  dR(11,16,2,2,'#999');dR(11,21,2,2,'#999');
  // Stethoscope
  dR(6,14,2,8,'#444');dR(4,22,6,3,'#555');dR(5,24,4,3,'#666');
  // Head (skin)
  dR(5,0,14,12,'#ffcc88');dR(6,1,12,10,'#f0bb77');
  // Hair
  dR(4,-2,16,5,'#3a2211');dR(3,-1,3,6,'#3a2211');dR(18,-1,3,6,'#3a2211');
  // Eyes
  dR(8,4,3,3,'#fff');dR(14,4,3,3,'#fff');
  dR(9,5,2,2,'#334');dR(15,5,2,2,'#334');
  // Mouth
  dR(10,8,4,1,'#cc8866');
  // Arms
  const armSwing=j?0:Math.sin(fr*0.3)*4;
  dR(0,12,4,10+armSwing,'#e8e8f0');dR(-1,22+armSwing,5,3,'#ffcc88'); // left hand
  dR(20,12,4,10-armSwing,'#e8e8f0');dR(20,22-armSwing,5,3,'#ffcc88'); // right hand
  // Name badge
  dR(14,13,5,4,'#44ffaa');dR(15,14,3,2,'#fff');
  ctx.restore();
}

function drawBug(x,y,bk,time,scale){
  const s=scale||1.5;const b=BUGS[bk]||BUGS.ECOLI;const c=b.color;const bob=Math.sin(time*3)*3;
  ctx.save();ctx.translate(x,y+bob);
  if(b.gram==='pos'){for(let i=0;i<5;i++){const a=(i/5)*Math.PI*2+time;const rx=Math.cos(a)*6*s,ry=Math.sin(a)*6*s;dR(rx-4*s,ry-4*s,8*s,8*s,c);dR(rx-2*s,ry-2*s,4*s,4*s,'#fff3')}dR(-5*s,-5*s,10*s,10*s,c)}
  else if(b.gram==='neg'){for(let i=0;i<3;i++){const a=(i/3)*Math.PI*2+time*0.5;const rx=Math.cos(a)*5*s,ry=Math.sin(a)*5*s;ctx.save();ctx.translate(rx,ry);ctx.rotate(a);dR(-8*s,-3*s,16*s,6*s,c);dR(-6*s,-1*s,12*s,2*s,'#fff2');ctx.restore()}
    if(bk==='PSEUDO'){ctx.strokeStyle=c;ctx.lineWidth=2;ctx.beginPath();for(let i=0;i<3;i++){ctx.moveTo(-10*s,(i-1)*5*s);for(let j=0;j<8;j++)ctx.lineTo(-10*s-j*3*s,(i-1)*5*s+Math.sin(j+time*3)*3*s)}ctx.stroke()}}
  else{for(let i=0;i<7;i++){const a=(i/7)*Math.PI*2+time*0.8;const d=4+Math.sin(time*2+i)*2;dR(Math.cos(a)*d*s-2*s,Math.sin(a)*d*s-2*s,4*s,4*s,c)}dR(-3*s,-3*s,6*s,6*s,c)}
  dR(-3*s,-2*s,2*s,2*s,'#ff0');dR(2*s,-2*s,2*s,2*s,'#ff0');dR(-2*s,-1*s,1*s,1*s,'#000');dR(3*s,-1*s,1*s,1*s,'#000');
  ctx.restore();
}

function drawHazard(h,t){
  if(h.type==='spike'){for(let i=0;i<h.w;i+=16){ctx.fillStyle='#ff444488';ctx.beginPath();ctx.moveTo(h.x+i,h.y+TILE);ctx.lineTo(h.x+i+8,h.y);ctx.lineTo(h.x+i+16,h.y+TILE);ctx.fill()}}
  else if(h.type==='biohazard'){const p=0.4+Math.sin(t*4)*0.2;ctx.fillStyle=`rgba(100,255,0,${p})`;ctx.fillRect(h.x,h.y,h.w,TILE*0.5);dT('☣',h.x+h.w/2-6,h.y-2,8,`rgba(100,255,0,${p+0.3})`)}
  else if(h.type==='puddle'){ctx.fillStyle='rgba(60,120,200,0.35)';ctx.fillRect(h.x,h.y,h.w,TILE*0.3)}
}

function drawProjectile(p,t){
  ctx.save();ctx.translate(p.x,p.y);ctx.rotate(t*3+p.id);
  const c=p.color||'#ff668888';
  dR(-5,-5,10,10,c);dR(-3,-3,6,6,'#fff3');
  ctx.restore();
}

// ===== UPDATE =====
let hazardCD=0;
function updatePlatformer(dt){
  if(S.screen!=='playing')return;
  const lv=LEVELS[S.level];const time=Date.now()/1000;
  if(P.invincible>0)P.invincible--;if(hazardCD>0)hazardCD--;

  // Input
  if(keys.ArrowLeft||keys.KeyA){P.vx=-4.5;P.facing=-1}
  else if(keys.ArrowRight||keys.KeyD){P.vx=4.5;P.facing=1}
  else{P.vx*=0.8;if(Math.abs(P.vx)<0.3)P.vx=0}
  if((keys.Space||keys.ArrowUp||keys.KeyW)&&P.onGround){P.vy=-9.5;P.onGround=false;sfx('jump')}
  // Player shooting (X or F key)
  if(shootCD>0)shootCD--;
  if((keys.KeyX||keys.KeyF)&&shootCD<=0){
    shootCD=18; // fire rate cooldown
    playerBullets.push({x:P.x+12,y:P.y+12,vx:P.facing*7,vy:0,life:60});
    sfx('projectile');
  }

  P.vy+=0.5;
  let inPuddle=false;
  for(const h of lvHazards)if(h.type==='puddle'&&P.x+P.w>h.x&&P.x<h.x+h.w&&P.y+P.h>h.y&&P.y+P.h<h.y+TILE)inPuddle=true;
  if(inPuddle)P.vx*=0.5;
  P.x+=P.vx;P.y+=P.vy;

  P.onGround=false;
  for(const p of lv.platforms){if(P.x+P.w>p.x&&P.x<p.x+p.w&&P.y+P.h>p.y&&P.y+P.h<p.y+p.h+10&&P.vy>=0){P.y=p.y-P.h;P.vy=0;P.onGround=true}}
  if(P.x<0)P.x=0;if(P.x>lv.width*TILE-P.w)P.x=lv.width*TILE-P.w;
  if(P.y>lv.height*TILE){P.y=(lv.height-4)*TILE;P.vy=0;takeDmg(20)}

  if(Math.abs(P.vx)>0.5&&P.onGround){P.walkTimer+=0.15;P.walkFrame=P.walkTimer;stepTimer+=dt;if(stepTimer>200){stepTimer=0;sfx('step')}}else stepTimer=0;

  cam.x+=(P.x-W/2+P.w/2-cam.x)*0.08;cam.y+=(P.y-H/2+P.h/2-cam.y)*0.08;
  cam.x=Math.max(0,Math.min(cam.x,lv.width*TILE-W));cam.y=Math.max(0,Math.min(cam.y,lv.height*TILE-H));

  // Bugs — patrol, chase, SHOOT
  for(const b of lvBugs){
    if(!b.alive)continue;
    const dx=P.x-b.x,dy=P.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<b.aggroR){b.x+=(dx>0?1:-1)*b.chaseSpd;b.dir=dx>0?1:-1}
    else{b.x+=b.dir*b.spd;if(b.x<=b.patrolL||b.x>=b.patrolR)b.dir*=-1}

    // Shooting
    if(b.shoot){
      b.shootTimer--;
      if(b.shootTimer<=0&&dist<b.aggroR*1.5){
        b.shootTimer=45+Math.random()*35;
        const sc=SCENARIOS[b.sc];const bugC=BUGS[sc.bugKey].color;
        const angle=Math.atan2(dy,dx);
        projectiles.push({x:b.x+12,y:b.y+10,vx:Math.cos(angle)*3.5,vy:Math.sin(angle)*3.5,life:120,color:bugC+'88',id:Math.random()});
        sfx('projectile');
      }
    }

    // Touch bug = take damage yourself (must SHOOT to damage bugs)
    if(Math.abs(P.x-b.x)<26&&Math.abs(P.y-b.y)<26){
      takeDmg(5);b.x+=(b.x-P.x>0?1:-1)*40; // knockback bug away
    }
  }

  // Update projectiles (enemy)
  projectiles=projectiles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(Math.abs(P.x+12-p.x)<16&&Math.abs(P.y+15-p.y)<16){takeDmg(8);p.life=0}
    return p.life>0;
  });

  // Update player bullets
  playerBullets=playerBullets.filter(pb=>{
    pb.x+=pb.vx;pb.y+=pb.vy;pb.life--;
    // Hit grunts
    for(const g of grunts){if(!g.alive)continue;
      if(Math.abs(pb.x-g.x-12)<20&&Math.abs(pb.y-g.y-10)<20){
        g.hp--;pb.life=0;sfx('bossHit');
        addFloat('-1',g.x-cam.x,g.y-cam.y-15,'#ffdd44');
        if(g.hp<=0){g.alive=false;S.score+=30;addFloat('+30',g.x-cam.x,g.y-cam.y-25,'#44ffaa');sfx('correct');
          for(let i=0;i<6;i++)S.particles.push({x:g.x-cam.x+12,y:g.y-cam.y+10,vx:(Math.random()-.5)*6,vy:(Math.random()-.5)*6,life:20,color:g.color,size:3})}
        break;
      }
    }
    // Hit trivia bugs — deal damage, trigger battle at 0 HP
    for(const b of lvBugs){if(!b.alive)continue;
      if(Math.abs(pb.x-b.x-12)<18&&Math.abs(pb.y-b.y-10)<18){
        pb.life=0;b.hp--;sfx('bossHit');b.x-=pb.vx*2;
        addFloat('-1',b.x-cam.x,b.y-cam.y-15,'#ffdd44');
        for(let i=0;i<3;i++)S.particles.push({x:b.x-cam.x+12,y:b.y-cam.y+10,vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,life:15,color:BUGS[SCENARIOS[b.sc].bugKey].color,size:2});
        if(b.hp<=0){b.alive=false;startBattle(b)}
        break;
      }
    }
    return pb.life>0;
  });

  // Update grunts (patrol + shoot)
  for(const g of grunts){if(!g.alive)continue;
    const dx=P.x-g.x,dy=P.y-g.y,dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<8*TILE){g.x+=(dx>0?1:-1)*g.spd;g.dir=dx>0?1:-1}
    else{g.x+=g.dir*g.spd;if(g.x<=g.patrolL||g.x>=g.patrolR)g.dir*=-1}
    if(g.shoot){g.shootTimer--;
      if(g.shootTimer<=0&&dist<9*TILE){g.shootTimer=70+Math.random()*50;
        const angle=Math.atan2(dy,dx);
        projectiles.push({x:g.x+12,y:g.y+10,vx:Math.cos(angle)*3,vy:Math.sin(angle)*3,life:100,color:g.color,id:Math.random()});
    }}
    // Touch damage
    if(Math.abs(P.x-g.x)<22&&Math.abs(P.y-g.y)<22){takeDmg(10)}
  }

  // Hazards
  for(const h of lvHazards){
    if(P.x+P.w>h.x&&P.x<h.x+h.w&&P.y+P.h>h.y&&P.y<h.y+TILE){
      if(h.type==='spike'&&hazardCD<=0){takeDmg(15);hazardCD=40;P.vy=-6}
      else if(h.type==='biohazard'&&hazardCD<=0){takeDmg(5);hazardCD=30}
    }
  }

  // Collectibles
  for(const c of lvCollect){if(!c.alive)continue;if(Math.abs(P.x-c.x)<28&&Math.abs(P.y-c.y)<28){
    c.alive=false;sfx('collect');
    if(c.type==='vial'){S.score+=50;S.hp=Math.min(S.maxHp,S.hp+15);addFloat('+50 HP+15',P.x-cam.x,P.y-cam.y,'#44ffaa')}
    else if(c.type==='idConsult'){S.powerUps.idConsult++;addFloat('🧠 +1 ID Consult!',P.x-cam.x,P.y-cam.y-20,'#44ffaa')}
    else{S.score+=100;addFloat(c.text,W/2,H/2-50,'#ffdd44',true,180)}
  }}

  // Boss gate check
  if(!bossDefeated&&P.x>bossGateX-20&&P.x<bossGateX+TILE*2){
    if(P.x>bossGateX)P.x=bossGateX;
    if(lvBugs.every(b=>!b.alive)&&grunts.every(g=>!g.alive)&&!S.bossActive){
      startBoss();
    }
  }
}

function takeDmg(a){if(P.invincible>0)return;S.hp-=a;sfx('hurt');P.invincible=30;S.shakeTimer=12;S.shakeIntensity=6;addFloat('-'+a,P.x-cam.x,P.y-cam.y-20,'#ff4444');if(S.hp<=0){S.screen='gameover';homeBtn.classList.add('hidden')}}

// ===== BOSS SYSTEM =====
function startBoss(){
  const bd=BOSS_DEFS[S.level]||BOSS_DEFS[0];
  S.bossActive=true;S.bossPhase='intro';
  S.bossData=bd;S.bossHP=bd.hp;S.bossMaxHP=bd.hp;S.bossQ=0;
  S.bossTimer=0;S.bossResult=null;S.bossVictoryTimer=0;
  S.bossElims=[];S.bossIdUsed=false;
  projectiles=[];
  sfx('bossRoar');
}

function nextBossTrivia(){
  if(S.bossHP<=0){
    // Boss defeated!
    S.bossPhase='victory';S.bossVictoryTimer=180;sfx('bossDefeat');
    S.score+=500;
    for(let i=0;i<40;i++)S.particles.push({x:W/2,y:H*0.3,vx:(Math.random()-.5)*12,vy:(Math.random()-.5)*12,life:50+Math.random()*30,color:S.bossData.color,size:3+Math.random()*5});
    return;
  }
  if(S.bossQ>=S.bossData.triviaCount){
    // Ran out of questions but boss still alive — boss overwhelms you!
    S.bossPhase='bosswins';S.hp-=30;sfx('wrong');S.shakeTimer=30;S.shakeIntensity=15;
    addFloat('BOSS OVERWHELMS YOU! -30',W/2,H/2,'#ff4444');
    for(let i=0;i<20;i++)S.particles.push({x:W/2,y:H*0.3,vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*10,life:30,color:'#ff4444',size:4});
    if(S.hp<=0){setTimeout(()=>{S.bossActive=false;S.screen='gameover';homeBtn.classList.add('hidden')},1500)}
    else{
      // Boss gets more questions — fight continues with extra damage
      S.bossQ=0;S.bossData.triviaCount=Math.max(3,S.bossData.triviaCount);
      setTimeout(()=>{nextBossTrivia()},2000);
    }
    return;
  }
  // No-repeat: pick from unused indices
  let avail=[];
  for(let i=0;i<TRIVIA_POOL.length;i++){if(!S.usedBossTrivia.includes(i))avail.push(i)}
  if(avail.length===0){S.usedBossTrivia=[];avail=TRIVIA_POOL.map((_,i)=>i)} // reset if exhausted
  const pick=avail[Math.floor(Math.random()*avail.length)];
  S.usedBossTrivia.push(pick);
  S.bossTriviaQ=TRIVIA_POOL[pick];
  S.bossTimer=30.0;S.bossResult=null;S.bossPhase='trivia';
  S.bossIdUsed=false;S.bossElims=[];
}

function bossUse5050(){
  if(S.bossIdUsed||S.powerUps.idConsult<=0||S.bossPhase!=='trivia'||S.bossResult!==null)return;
  S.bossIdUsed=true;S.powerUps.idConsult--;sfx('5050');
  const q=S.bossTriviaQ;const wrong=[];
  for(let i=0;i<4;i++){if(i!==q.ans&&!S.bossElims.includes(i))wrong.push(i)}
  // Eliminate 2 wrong answers
  for(let i=0;i<2&&wrong.length>0;i++){const r=Math.floor(Math.random()*wrong.length);S.bossElims.push(wrong.splice(r,1)[0])}
}

function answerBossTrivia(idx){
  if(S.bossPhase!=='trivia'||S.bossResult!==null)return;
  if(S.bossElims.includes(idx))return; // eliminated by 50/50
  const q=S.bossTriviaQ;
  if(idx===q.ans){
    S.bossResult='correct';S.bossHP--;S.score+=100;sfx('bossHit');
    S.shakeTimer=10;S.shakeIntensity=8;
    for(let i=0;i<15;i++)S.particles.push({x:W/2,y:H*0.25,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,life:30,color:S.bossData.color,size:3+Math.random()*3});
    S.streak++;if(S.streak>S.bestStreak)S.bestStreak=S.streak;
    if(S.streak===5){S.powerUps.idConsult++;sfx('streak')}
  }else{
    S.bossResult='wrong';S.hp-=15;sfx('wrong');S.streak=0;S.shakeTimer=15;S.shakeIntensity=10;
    if(S.hp<=0){S.bossActive=false;S.screen='gameover';homeBtn.classList.add('hidden');return}
  }
  S.bossQ++;
  setTimeout(()=>{nextBossTrivia()},1500);
}

function bossTimerTick(dt){
  if(S.bossPhase==='trivia'&&S.bossResult===null){
    S.bossTimer-=dt/1000;
    if(S.bossTimer<=5&&S.bossTimer>4.95)sfx('tick');
    if(S.bossTimer<=0){
      S.bossResult='timeout';S.hp-=10;sfx('timeup');S.streak=0;S.bossQ++;
      if(S.hp<=0){S.bossActive=false;S.screen='gameover';homeBtn.classList.add('hidden');return}
      setTimeout(()=>{nextBossTrivia()},1500);
    }
  }
  if(S.bossPhase==='victory'){S.bossVictoryTimer--;if(S.bossVictoryTimer<=0){S.bossActive=false;bossDefeated=true;sfx('levelComplete');
    if(S.level<LEVELS.length-1)initLevel(S.level+1);else{S.screen='victory';homeBtn.classList.add('hidden')}}}
  if(S.bossPhase==='intro'){S.bossTimer+=dt/1000;if(S.bossTimer>2){nextBossTrivia()}}
}

// ===== BATTLE SYSTEM =====
let battleFlash='',battleFlashT=0,empOpts=[],narOpts=[],usedIdC=false,elimIdxs=[];

function startBattle(bug){
  const sc=SCENARIOS[bug.sc];S.screen='battle';S.battlePhase=0;S.selectedEmpiric=null;S.empiricResult=null;S.empiricPicks=[];
  S.battleData={scenario:sc,bugKey:sc.bugKey,bugData:BUGS[sc.bugKey],bugIdx:bug.id,blind:LEVELS[S.level].blind||false};
  battleFlash='';battleFlashT=0;usedIdC=false;elimIdxs=[];
  empOpts=sc.empiricOptions.map(k=>({key:k,name:ABX[k].name}));
  for(let i=empOpts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[empOpts[i],empOpts[j]]=[empOpts[j],empOpts[i]]}
  narOpts=[];sfx('battleStart');
}

function handleBattleClick(mx,my){
  if(!S.battleData)return;const sc=S.battleData.scenario;
  if(S.battlePhase===0&&!S.selectedEmpiric){
    const puY=H-55;
    if(S.powerUps.idConsult>0&&!usedIdC&&mx>W-260&&mx<W-160&&my>puY&&my<puY+30){
      usedIdC=true;S.powerUps.idConsult--;sfx('5050');
      // 50/50: eliminate ~half the wrong answers
      const goodKeys=[...sc.bestSingle,...sc.acceptSingle];
      if(sc.bestCombo&&COMBOS[sc.bestCombo])goodKeys.push(...COMBOS[sc.bestCombo].drugs);
      const wrong=[];for(let i=0;i<empOpts.length;i++){if(!elimIdxs.includes(i)&&!goodKeys.includes(empOpts[i].key))wrong.push(i)}
      const toRemove=Math.min(wrong.length,3); // remove up to 3 wrong answers from 6
      for(let r=0;r<toRemove&&wrong.length>0;r++){const ri=Math.floor(Math.random()*wrong.length);elimIdxs.push(wrong.splice(ri,1)[0])}
      return}
    const cols=isMobile?2:3,btnW=isMobile?Math.min(180,(W-30)/2):Math.min(280,W*0.28),btnH=isMobile?34:38,sx=W*0.05,sy=isMobile?H*0.52:H*0.55,gx=Math.max(6,(W*0.9-cols*btnW)/(cols-1)),gy=isMobile?6:10;
    for(let i=0;i<empOpts.length;i++){if(elimIdxs.includes(i))continue;const col=i%cols,row=Math.floor(i/cols),bx=sx+col*(btnW+gx),by=sy+row*(btnH+gy);
      if(mx>bx&&mx<bx+btnW&&my>by&&my<by+btnH){const pos=S.empiricPicks.indexOf(i);if(pos>=0){S.empiricPicks.splice(pos,1);sfx('deselect')}else{if(S.empiricPicks.length>=2)S.empiricPicks.shift();S.empiricPicks.push(i);sfx('select')}return}}
    if(S.empiricPicks.length>0){const cbx=W/2-80,cby=H-95;if(mx>cbx&&mx<cbx+160&&my>cby&&my<cby+36){confirmEmpiric();return}}
  }else if(S.battlePhase===1){
    if(narOpts.length===0)narOpts=getNarrowOpts(sc);const btnW=isMobile?Math.min(180,(W-30)/2):Math.min(320,W*0.38),btnH=isMobile?36:42,sy=H*0.55,ngx=isMobile?W*0.04:W*0.08;
    for(let i=0;i<narOpts.length;i++){const bx=(i%2===0)?ngx:W-ngx-btnW,by=sy+Math.floor(i/2)*(btnH+10);if(mx>bx&&mx<bx+btnW&&my>by&&my<by+btnH){selectNarrow(i);return}}
  }else if(S.battlePhase===2){if(mx>W/2-80&&mx<W/2+80&&my>H-55&&my<H-19){endBattle()}}
}

function confirmEmpiric(){
  const sc=S.battleData.scenario,pk=S.empiricPicks.map(i=>empOpts[i].key),pn=S.empiricPicks.map(i=>empOpts[i].name);
  const ck=checkCombo(pk),isTC=ck&&sc.bestCombo===ck;
  let res,pts;
  if(isTC){res='best';pts=300;sfx('combo');S.comboAnim=60;battleFlash='green';S.streak++;if(S.streak>S.bestStreak)S.bestStreak=S.streak;if(S.streak===5){S.powerUps.idConsult++;sfx('streak')}}

    if(!S.lbSubmitted&&mx>W/2-110&&mx<W/2+110&&my>H*0.32&&my<H*0.32+36){S.nameEntry=true;S.nameText='';return}
    const btnY=Math.max(H*0.84,(S.lbSubmitted?H*0.34:H*0.40)+170);
    if(mx>W/2-80&&mx<W/2+80&&my>btnY&&my<btnY+36){const hs=parseInt(localStorage.getItem('bw_hs')||'0');if(S.score>hs)localStorage.setItem('bw_hs',S.score);S.screen='title';S.lbSubmitted=false;homeBtn.classList.add('hidden')}}}

function confirmHome(){if(confirm('Return to menu?')){S.screen='title';S.bossActive=false;S.lbSubmitted=false;S.paused=false;homeBtn.classList.add('hidden')}}

// ===== CLICK =====
canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;initAudio();
  if(S.bossActive){handleBossClick(mx,my);return}
  switch(S.screen){case'title':handleTitleClick(mx,my);break;case'battle':handleBattleClick(mx,my);break;case'codex':handleCodexClick(mx,my);break;
    case'howto':if(mx>W/2-60&&mx<W/2+60&&my>H-50&&my<H-18)S.screen='title';break;case'gameover':case'victory':handleEndClick(mx,my);break}});
canvas.addEventListener('wheel',e=>{if(S.screen==='codex'){S.codexScroll+=e.deltaY*0.5;
  let totalH=0;
  if(S.codexTab==='bugs'){const grps=[b=>b.gram==='pos',b=>b.gram==='neg',b=>b.gram==='atyp'];for(const f of grps){const n=Object.keys(BUGS).filter(k=>f(BUGS[k])).length;if(n>0)totalH+=32+n*96+4}}
  else{const grpNames=[...new Set(Object.values(ABX).map(a=>a.grp))];for(const g of grpNames){const n=Object.keys(ABX).filter(k=>ABX[k].grp===g).length;if(n>0)totalH+=32+n*96+4}}
  const max=Math.max(0,totalH-H+100);S.codexScroll=Math.max(0,Math.min(S.codexScroll,max));e.preventDefault()}},{passive:false});

// ===== GAME LOOP =====
let lastT=0;
function loop(ts){const dt=ts-lastT;lastT=ts;resize();
  // Show controls bar during gameplay screens
  const inGame=S.screen==='playing'||S.screen==='battle'||S.screen==='levelIntro'||S.bossActive;
  if(isMobile){
    // Mobile: show touch controls during gameplay
    if(inGame||S.paused){touchControls.classList.add('show')}
    else{touchControls.classList.remove('show')}
    if(S.screen==='gameover'||S.screen==='victory'){touchControls.classList.remove('show')}
    controlsBar.classList.remove('show');homeBtn.classList.add('hidden');
  }else{
    // Desktop: show keyboard controls bar
    if(inGame||S.paused){controlsBar.classList.add('show');homeBtn.classList.remove('hidden')}
    else{controlsBar.classList.remove('show');homeBtn.classList.add('hidden')}
    if(S.screen==='gameover'||S.screen==='victory'){controlsBar.classList.remove('show');homeBtn.classList.add('hidden')}
  }
  // Pause check
  if(S.paused){
    renderPlatformer();if(S.bossActive)renderBoss();else if(S.screen==='battle')renderBattle();
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,0,W,H);
    ctx.shadowColor='#44ffaa';ctx.shadowBlur=20;
    dT('⏸ PAUSED',W/2,H*0.4,24,'#44ffaa','center');ctx.shadowBlur=0;
    dT(isMobile?'Tap ⏸ to resume':'Press P to resume',W/2,H*0.52,10,'#88aa88','center');
    requestAnimationFrame(loop);return;
  }
  updateEffects(dt);
  if(S.bossActive){renderPlatformer();renderBoss()}
  else{switch(S.screen){case'title':renderTitle();break;case'playing':updatePlatformer(dt);renderPlatformer();break;case'battle':renderBattle();break;case'codex':renderCodex();break;case'howto':renderHowTo();break;case'levelIntro':renderLevelIntro();break;case'gameover':renderGameOver();break;case'victory':renderVictory();break}}
  for(const f of S.floatingTexts){ctx.globalAlpha=f.life/f.maxLife;if(f.centered)dT(f.text,f.x,f.y,f.text.length>30?9:12,f.color,'center',W*0.8);else dT(f.text,f.x,f.y,10,f.color)}ctx.globalAlpha=1;
  if(S.screen==='playing'&&!S.bossActive&&S.hp<=0){S.screen='gameover';homeBtn.classList.add('hidden')}
  requestAnimationFrame(loop)}
requestAnimationFrame(loop);
</script>
